<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulsenet Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Layer 1: YouTube player (bottom) -->
    <div id="video-wrap">
      <div id="player"></div>
    </div>

    <!-- Layer 2: Sci-fi frame (no glow, structural) -->
    <img id="frame-base" src="assets/frame_base.png" draggable="false" alt="">

    <!-- Layer 3: Glow overlay (animated) — hidden via CSS if asset missing -->
    <img id="frame-glow" src="assets/frame_glow.png" draggable="false" alt=""
         onerror="this.style.display='none'">

    <!-- Layer 4: Station selector buttons -->
    <div id="stations-left"  class="station-col"></div>
    <div id="stations-right" class="station-col"></div>

  </div>

  <script src="stations.js"></script>
  <script src="player.js"></script>
</body>
</html>
